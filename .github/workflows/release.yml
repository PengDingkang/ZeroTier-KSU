name: Release Module

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, e.g. v1.0.0
        required: false
        type: string
      release_name:
        description: Release title override
        required: false
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu

      - name: Read module metadata
        id: meta
        shell: bash
        run: |
          module_version="$(sed -n 's/^version=//p' module.prop)"
          core_version="$(tr -d '\r\n' < CORE_VERSION)"
          tag_name="${{ github.event.inputs.tag_name }}"
          release_name="${{ github.event.inputs.release_name }}"
          if [ -z "$tag_name" ]; then
            tag_name="$module_version"
          fi
          if [ -z "$release_name" ]; then
            release_name="ZeroTier KSU ${module_version} (core ${core_version})"
          fi
          package_name="ZeroTier-KSU-${module_version}-core-${core_version}.zip"
          echo "module_version=${module_version}" >> "$GITHUB_OUTPUT"
          echo "core_version=${core_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Validate shell scripts
        shell: bash
        run: |
          sh -n customize.sh
          sh -n boot-completed.sh
          sh -n uninstall.sh
          sh -n zerotier

      - name: Build zerotier-one for aarch64
        shell: bash
        run: |
          core_version="${{ steps.meta.outputs.core_version }}"
          git clone --depth 1 --branch "${core_version}" https://github.com/zerotier/ZeroTierOne.git /tmp/zt-build

          cd /tmp/zt-build
          sed -i 's/$(ONE_OBJS): zeroidc smeeclient//' make-linux.mk

          make -j"$(nproc)" \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            ZT_STATIC=1 \
            ZT_EMBEDDED=1 \
            one

          aarch64-linux-gnu-strip zerotier-one
          file zerotier-one
          cp zerotier-one "$GITHUB_WORKSPACE/zerotier-one"

      - name: Create release package
        shell: bash
        run: |
          mkdir -p dist
          zip -qr "dist/${{ steps.meta.outputs.package_name }}" \
            META-INF \
            webroot \
            boot-completed.sh \
            customize.sh \
            zerotier \
            zerotier-one \
            module.prop \
            uninstall.sh

      - name: Generate update JSON
        shell: bash
        run: |
          cat > dist/update.json <<EOF
          {
            "version": "${{ steps.meta.outputs.module_version }}",
            "versionCode": $(sed -n 's/^versionCode=//p' module.prop),
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag_name }}/${{ steps.meta.outputs.package_name }}",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/changelog.md"
          }
          EOF

      - name: Update repository update files
        if: ${{ !github.event.inputs.prerelease }}
        shell: bash
        run: |
          cp dist/update.json update.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "Update update.json for ${{ steps.meta.outputs.tag_name }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/${{ steps.meta.outputs.package_name }}
          generate_release_notes: true
